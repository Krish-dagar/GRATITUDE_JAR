<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gratitude Jar</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-gold">

  <!-- THEME SWITCHER -->
  <div class="theme-bar">
    <span class="theme-label">Theme</span>
    <div class="theme-swatches">
      <div class="swatch active" data-theme="theme-gold"  style="background:#c8922a" title="Warm Gold"></div>
      <div class="swatch"        data-theme="theme-rose"  style="background:#c0455a" title="Rose"></div>
      <div class="swatch"        data-theme="theme-sage"  style="background:#3d8c5a" title="Sage"></div>
      <div class="swatch"        data-theme="theme-ocean" style="background:#1a6fa8" title="Ocean"></div>
      <div class="swatch"        data-theme="theme-dusk"  style="background:#9b72e8" title="Dusk"></div>
      <div class="swatch"        data-theme="theme-slate" style="background:#4a5a8a" title="Slate"></div>
    </div>
  </div>

  <!-- PARTICLES -->
  <div class="particles" id="particles"></div>

  <!-- HEADER -->
  <header>
    <div class="eyebrow">Your daily practice</div>
    <h1>Gratitude <em>Jar</em></h1>
    <p class="subtitle">Collect the small wonders. Revisit them when you need them most.</p>
  </header>

  <!-- INPUT CARD -->
  <div class="input-card">
    <label class="input-label" for="noteInput">Today I'm grateful for...</label>
    <textarea id="noteInput" placeholder="A warm cup of tea, a kind word, a quiet morning..." maxlength="280" oninput="updateCharCount()"></textarea>
    <div class="char-count"><span id="charCount">0</span> / 280</div>
    <button class="add-btn" onclick="addNote()">
      <span class="btn-icon">+</span>
      Add to Jar
    </button>
  </div>

  <!-- JAR -->
  <div class="jar-section">
    <div class="jar-wrap" onclick="showRandomNote()" title="Click to draw a note">
      <div class="jar-outer">
        <svg class="jar-svg" viewBox="0 0 160 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Lid -->
          <rect id="jarLidBase" x="44" y="14" width="72" height="18" rx="6" fill="#c8922a" opacity="0.9"/>
          <rect id="jarLidTop"  x="52" y="8"  width="56" height="12" rx="5" fill="#e8b84b"/>
          <!-- Jar body -->
          <g class="jar-body">
            <path id="jarBody" d="M30 40 Q28 70 26 120 Q24 160 30 175 Q40 192 80 192 Q120 192 130 175 Q136 160 134 120 Q132 70 130 40 Z" fill="#fdf8f0" stroke="#e2d4b8" stroke-width="2"/>
            <!-- Shine highlights -->
            <path d="M40 55 Q38 90 37 130" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
            <path d="M48 50 Q46 70 45 90" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
            <!-- Notes inside (visible when jar has notes) -->
            <g id="jarNotes" opacity="0">
              <rect id="jarNote1" x="50" y="100" width="60" height="10" rx="3" fill="#f5e6c8" transform="rotate(-8, 80, 105)"/>
              <rect id="jarNote2" x="48" y="120" width="55" height="10" rx="3" fill="#e8d4a8" transform="rotate(5, 75, 125)"/>
              <rect id="jarNote3" x="55" y="140" width="50" height="10" rx="3" fill="#f0d8b0" transform="rotate(-3, 80, 145)"/>
            </g>
            <!-- Label -->
            <rect id="jarLabel" x="46" y="68" width="68" height="42" rx="5" fill="white" opacity="0.7" stroke="#e2d4b8" stroke-width="1"/>
            <text id="jarText1" x="80" y="85" text-anchor="middle" font-family="'Cormorant Garamond', serif" font-size="8" fill="#6b5840" font-style="italic">Gratitude</text>
            <line id="jarLine"  x1="56" y1="92" x2="104" y2="92" stroke="#e2d4b8" stroke-width="0.8"/>
            <text id="jarText2" x="80" y="102" text-anchor="middle" font-family="'Jost', sans-serif" font-size="6" fill="#a8916e" letter-spacing="1">JAR</text>
          </g>
        </svg>
      </div>
      <div class="notes-badge" id="notesBadge">0 notes</div>
    </div>
    <div class="jar-hint">Click the jar to draw a note</div>

    <!-- REVEALED NOTE -->
    <div class="note-reveal" id="noteReveal">
      <div class="note-reveal-inner">
        <div class="note-reveal-label">A moment of gratitude</div>
        <div class="note-text" id="noteText"></div>
        <div class="note-actions">
          <button class="action-btn" onclick="showRandomNote()">Draw Another</button>
          <button class="action-btn" onclick="closeReveal()">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- NOTES LIST -->
  <div class="notes-section">
    <div class="notes-header">
      <div class="notes-title">All your notes</div>
      <button class="toggle-list-btn" id="toggleBtn" onclick="toggleList()">Show All</button>
    </div>
    <ul class="notes-list" id="notesList"></ul>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
